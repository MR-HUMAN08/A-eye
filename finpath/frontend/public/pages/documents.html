<div class="page-header"><h2>Documents</h2></div>
<div class="page-grid">
  <section class="card span-12" id="upload-zone" style="border-style: dashed; text-align: center;">
    <h3>Drop PDF or Excel file here</h3>
    <p>Drag and drop or browse files</p>
    <input id="document-file" type="file" accept=".pdf,.xlsx,.xls" />
  </section>
  <section class="card span-12 hidden" id="upload-progress"></section>
  <section class="card span-12" id="document-result">Upload a file to start extraction and analysis.</section>
</div>
